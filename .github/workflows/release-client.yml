name: Release CodeMaster Client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix, for example 1.0.1
        required: true
        default: "1.0.0"

permissions:
  contents: write

concurrency:
  group: release-client-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}

jobs:
  build-client:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - name: Linux ARM64
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,appimage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: CodeMaster.Vue/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: CodeMaster.Vue/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: CodeMaster.Vue
        run: npm ci --legacy-peer-deps

      - name: Apply release version
        working-directory: CodeMaster.Vue
        run: node scripts/set-tauri-release-version.mjs "${{ env.RELEASE_VERSION }}"

      - name: Publish LocalAgent sidecar
        working-directory: CodeMaster.Vue
        env:
          CODEMASTER_SIDECAR_TARGET: ${{ matrix.target }}
        run: npm run sidecar:publish

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: CodeMaster.Vue
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: CodeMaster Client ${{ env.RELEASE_TAG }}
          releaseBody: Download the installer for your operating system and architecture.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
